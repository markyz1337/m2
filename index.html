<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Player Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --accent: #ff5e3a;
            --glass: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { background: #000; color: white; height: 100vh; overflow: hidden; display: flex; justify-content: center; }

        .app-container {
            width: 100%; max-width: 430px; height: 100%;
            position: relative; overflow: hidden; display: flex; flex-direction: column;
        }

        /* Fundalul Rotit la 30 grade cu Blur */
        .bg-blur {
            position: absolute; top: -25%; left: -25%; width: 150%; height: 150%;
            background-size: cover; background-position: center;
            filter: blur(70px) brightness(0.4);
            transform: rotate(30deg);
            transition: background-image 0.8s ease-in-out;
            z-index: 0;
        }

        /* Navigația de sus */
        .header-tabs {
            position: relative; z-index: 10; padding: 20px; display: flex; gap: 10px; overflow-x: auto;
        }
        .tab {
            background: var(--glass); padding: 8px 18px; border-radius: 20px; font-size: 13px;
            backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); cursor: pointer;
        }
        .tab.active { background: var(--accent); border-color: transparent; }

        /* Lista de stații */
        .content { position: relative; z-index: 10; flex: 1; padding: 0 20px; overflow-y: auto; }
        .station-item {
            display: flex; align-items: center; padding: 15px 0;
            border-bottom: 0.5px solid rgba(255,255,255,0.1); cursor: pointer;
        }
        .station-thumb { width: 55px; height: 55px; border-radius: 12px; margin-right: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .station-name { font-weight: 600; font-size: 16px; margin-bottom: 4px; }
        .station-desc { font-size: 11px; color: #b3b3b3; text-transform: uppercase; letter-spacing: 0.5px; }

        /* Player View */
        #player-view {
            display: none; position: relative; z-index: 10; height: 100%;
            flex-direction: column; align-items: center; justify-content: center; padding: 40px;
        }
        .main-art {
            width: 85%; aspect-ratio: 1/1; border-radius: 25px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6); object-fit: cover; margin-bottom: 40px;
        }
        .track-info { text-align: center; margin-bottom: 40px; }
        .track-info h2 { font-size: 22px; font-weight: 600; margin-bottom: 8px; }
        .track-info p { color: #b3b3b3; font-size: 14px; }

        /* Controale */
        .main-controls { display: flex; align-items: center; gap: 30px; margin-bottom: 50px; }
        .btn-round {
            background: var(--glass); width: 55px; height: 55px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1);
        }
        .btn-play { background: #fff; color: #000; width: 70px; height: 70px; }
        .btn-play.playing { background: var(--accent); color: #fff; }

        .secondary-controls { display: flex; width: 100%; justify-content: space-between; padding: 0 10px; opacity: 0.8; }
        .icon-btn { cursor: pointer; padding: 5px; }

        /* Meniu Popup stil iOS */
        .popup {
            position: absolute; bottom: 100px; right: 20px; width: 230px;
            background: rgba(25, 25, 25, 0.9); backdrop-filter: blur(20px);
            border-radius: 18px; display: none; z-index: 100; border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 15px 40px rgba(0,0,0,0.5); overflow: hidden;
        }
        .menu-item {
            padding: 14px 18px; display: flex; align-items: center; gap: 12px;
            font-size: 14px; border-bottom: 0.5px solid rgba(255,255,255,0.05); cursor: pointer;
        }
        .menu-item:last-child { border: none; }
        .menu-item:active { background: rgba(255,255,255,0.1); }

        /* Navigația de jos tip Capsulă */
        .nav-bar {
            position: relative; z-index: 20; background: rgba(20,20,20,0.8);
            backdrop-filter: blur(20px); margin: 20px; border-radius: 35px;
            display: flex; justify-content: space-around; padding: 8px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .nav-link {
            display: flex; flex-direction: column; align-items: center; gap: 4px;
            padding: 8px 25px; border-radius: 25px; color: #777; cursor: pointer; font-size: 11px;
        }
        .nav-link.active { color: #fff; background: rgba(255,255,255,0.05); }
        .nav-link.active i { color: var(--accent); }

        /* Butonul Plus Plutitor */
        .fab {
            position: absolute; bottom: 100px; right: 25px; background: var(--accent);
            width: 55px; height: 55px; border-radius: 50%; display: flex;
            align-items: center; justify-content: center; box-shadow: 0 8px 20px rgba(255, 94, 58, 0.3);
            cursor: pointer; z-index: 15;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="bg-blur" id="dynamic-bg"></div>

    <div id="list-view" style="height:100%; display:flex; flex-direction:column;">
        <div class="header-tabs">
            <div class="tab active">Favorites</div>
            <div class="tab">Recent</div>
            <div class="tab">Discover</div>
        </div>
        <div class="content" id="stations-grid"></div>
        <div class="fab" onclick="alert('Add Stream')"><i data-lucide="plus"></i></div>
    </div>

    <div id="player-view">
        <img src="" class="main-art" id="player-img">
        <div class="track-info">
            <h2 id="station-title">Select Station</h2>
            <p id="station-sub">Ready to play</p>
        </div>

        <div class="main-controls">
            <div class="btn-round" onclick="prev()"><i data-lucide="skip-back" fill="white"></i></div>
            <div class="btn-round btn-play" id="play-trigger" onclick="togglePlay()"><i data-lucide="play" fill="currentColor"></i></div>
            <div class="btn-round" onclick="next()"><i data-lucide="skip-forward" fill="white"></i></div>
        </div>

        <div class="secondary-controls">
            <i data-lucide="heart" class="icon-btn"></i>
            <i data-lucide="plus" class="icon-btn"></i>
            <i data-lucide="volume-2" class="icon-btn"></i>
            <i data-lucide="clock" class="icon-btn"></i>
            <i data-lucide="more-horizontal" class="icon-btn" onclick="togglePopup()"></i>
        </div>
    </div>

    <div class="popup" id="menu-popup">
        <div class="menu-item" onclick="search()"><i data-lucide="youtube" size="18"></i> Search on YouTube</div>
        <div class="menu-item" onclick="copy()"><i data-lucide="copy" size="18"></i> Copy Info</div>
        <div class="menu-item" onclick="home()"><i data-lucide="globe" size="18"></i> Station Homepage</div>
    </div>

    <div class="nav-bar">
        <div class="nav-link active" onclick="switchTab('list', this)">
            <i data-lucide="radio"></i><span>Radio</span>
        </div>
        <div class="nav-link" onclick="switchTab('player', this)">
            <i data-lucide="play-circle"></i><span>Player</span>
        </div>
        <div class="nav-link" onclick="alert('Settings')">
            <i data-lucide="settings"></i><span>Settings</span>
        </div>
    </div>
</div>

<audio id="audio-engine"></audio>

<script>
    const stations = [
        {
            name: "One FM",
            stream: "https://live.onefm.ro/onefm.aacp",
            img: "https://onefm.es/wp-content/uploads/2023/09/LOGO-2025.jpg",
            desc: "Dance & House Station"
        },
        {
            name: "Heart 10s",
            stream: "https://media-ice.musicradio.com/Heart10sMP3",
            img: "https://images.weserv.nl/?url=www.globalplayer.com/assets/track-placeholders/heart10s.png",
            desc: "The best of 2010s"
        }
    ];

    let currentIdx = 0;
    const audio = document.getElementById('audio-engine');

    function init() {
        const grid = document.getElementById('stations-grid');
        stations.forEach((s, i) => {
            const el = document.createElement('div');
            el.className = 'station-item';
            el.innerHTML = `
                <img src="${s.img}" class="station-thumb">
                <div style="flex:1">
                    <div class="station-name">${s.name}</div>
                    <div class="station-desc">${s.desc}</div>
                </div>
                <i data-lucide="heart" size="18" color="#ff5e3a"></i>
            `;
            el.onclick = () => { currentIdx = i; playStation(); };
            grid.appendChild(el);
        });
        lucide.createIcons();
        loadStation(0); // Incarca prima fara sa porneasca
    }

    function loadStation(i) {
        const s = stations[i];
        document.getElementById('player-img').src = s.img;
        document.getElementById('dynamic-bg').style.backgroundImage = `url(${s.img})`;
        document.getElementById('station-title').innerText = s.name;
        document.getElementById('station-sub').innerText = s.desc;
        audio.src = s.stream;
    }

    function playStation() {
        loadStation(currentIdx);
        audio.play();
        updateUI(true);
        switchTab('player', document.querySelectorAll('.nav-link')[1]);
    }

    function togglePlay() {
        if (audio.paused) { audio.play(); updateUI(true); }
        else { audio.pause(); updateUI(false); }
    }

    function updateUI(isPlaying) {
        const btn = document.getElementById('play-trigger');
        btn.innerHTML = isPlaying ? '<i data-lucide="pause" fill="currentColor"></i>' : '<i data-lucide="play" fill="currentColor"></i>';
        btn.className = isPlaying ? 'btn-round btn-play playing' : 'btn-round btn-play';
        lucide.createIcons();
    }

    function next() { currentIdx = (currentIdx + 1) % stations.length; playStation(); }
    function prev() { currentIdx = (currentIdx - 1 + stations.length) % stations.length; playStation(); }

    function switchTab(view, el) {
        document.getElementById('list-view').style.display = view === 'list' ? 'flex' : 'none';
        document.getElementById('player-view').style.display = view === 'player' ? 'flex' : 'none';
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('menu-popup').style.display = 'none';
    }

    function togglePopup() {
        const p = document.getElementById('menu-popup');
        p.style.display = p.style.display === 'block' ? 'none' : 'block';
    }

    // Actiuni Popup
    function search() { window.open("https://youtube.com/results?search_query=" + stations[currentIdx].name, "_blank"); }
    function copy() { navigator.clipboard.writeText(stations[currentIdx].name); alert("Copied!"); }
    function home() { alert("Opening homepage..."); }

    init();
</script>
</body>
</html>
