<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sergiu FM</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --accent: #ff5e3a;
            --bg-dark: #000000;
        }

        /* Eliminăm orice scroll și forțăm înălțimea ecranului */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-dark);
            /* Fix pentru bara neagră: ignorăm zonele sigure la nivel de fundal */
            position: fixed; 
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            user-select: none;
        }

        .app-container {
            width: 100vw;
            height: 100dvh; /* Dynamic Viewport Height pentru mobil */
            position: relative;
            display: flex;
            flex-direction: column;
            /* AICI E SECRETUL: Padding-ul se aplică doar elementelor interne, nu fundalului */
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* Fundalul trebuie să fie ABSOLUT și să ignore safe-area pentru a nu lăsa dunga neagră */
        .bg-blur {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-size: cover;
            background-position: center;
            filter: blur(40px) brightness(0.3);
            z-index: -1;
            transition: opacity 1s ease;
        }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            padding-bottom: 100px; /* Spațiu pentru nav-bar */
        }

        /* Nav Bar-ul poziționat deasupra zonei de gesturi */
        .nav-bar {
            position: absolute;
            bottom: calc(env(safe-area-inset-bottom) + 15px);
            left: 20px;
            right: 20px;
            height: 65px;
            background: rgba(25, 25, 25, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 30px;
            display: flex;
            align-items: center;
            z-index: 100;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* Restul stilurilor rămân la fel ca în versiunea anterioară... */
        .station-item { display: flex; align-items: center; padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .station-thumb { width: 50px; height: 50px; border-radius: 10px; margin-right: 15px; }
        .nav-link { flex: 1; text-align: center; color: #777; font-size: 10px; display: flex; flex-direction: column; align-items: center; }
        .nav-link.active { color: white; }
        .fab { position: absolute; bottom: calc(env(safe-area-inset-bottom) + 95px); right: 20px; width: 56px; height: 56px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: black; z-index: 90; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="bg-blur" id="bg-layer"></div>
    
    <div id="list-view" style="display: flex; flex-direction: column; height: 100%;">
        <div class="content" id="stations-list">
            </div>
    </div>

    <div class="nav-bar">
        <div class="nav-link" onclick="location.reload()">
            <i data-lucide="radio"></i><span>Radio</span>
        </div>
        <div class="nav-link active">
            <i data-lucide="play-circle"></i><span>Player</span>
        </div>
    </div>

    <div class="fab" onclick="togglePlay()" id="master-fab">
        <i data-lucide="play"></i>
    </div>
</div>

<audio id="audio-engine" crossorigin="anonymous"></audio>

<script>
    // Inițializare Lucide
    lucide.createIcons();

    const audio = document.getElementById('audio-engine');
    const fab = document.getElementById('master-fab');
    
    // Exemplu stream
    const streamUrl = "https://sergiumusic.duckdns.org/muzicaveche";

    function togglePlay() {
        if (audio.paused) {
            if (!audio.src) audio.src = streamUrl;
            audio.play();
            fab.innerHTML = '<i data-lucide="pause"></i>';
        } else {
            audio.pause();
            fab.innerHTML = '<i data-lucide="play"></i>';
        }
        lucide.createIcons();
    }

    // Înregistrare Service Worker (MDN Logic)
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }
</script>
</body>
</html>
