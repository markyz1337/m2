<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sergiu FM Pro</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Sergiu FM">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="icon-180.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --accent: #ff5e3a;
            --glass: rgba(255, 255, 255, 0.1);
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        * { 
            box-sizing: border-box; 
            margin: 0; padding: 0; 
            font-family: 'Inter', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
        }

        html, body {
            height: 100dvh;
            width: 100vw;
            background: #000;
            color: #fff;
            overflow: hidden;
            position: fixed; /* Fixează viewport-ul pe iOS */
        }

        /* Containerul principal care previne scroll-ul paginii */
        .app-shell {
            display: flex;
            flex-direction: column;
            height: 100dvh;
            width: 100%;
            position: relative;
        }

        /* Fundal Dinamic cu straturi duble pentru cross-fade */
        .bg-engine {
            position: absolute;
            inset: -10%;
            width: 120%;
            height: 120%;
            z-index: 0;
        }

        .bg-layer {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            filter: blur(50px) brightness(0.3) saturate(1.5);
            transition: opacity 1.2s ease-in-out;
            opacity: 0;
        }

        /* Header Fix */
        header {
            position: relative;
            z-index: 10;
            padding: calc(var(--safe-top) + 15px) 20px 10px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.5), transparent);
        }

        .tabs-container {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 5px;
            scrollbar-width: none;
        }

        .tabs-container::-webkit-scrollbar { display: none; }

        .tab {
            padding: 8px 18px;
            background: var(--glass);
            border-radius: 20px;
            font-size: 13px;
            font-weight: 800;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            white-space: nowrap;
        }

        .tab.active { background: var(--accent); border-color: transparent; }

        /* Zona de conținut scrollabilă */
        .main-scroll {
            flex: 1;
            overflow-y: auto;
            position: relative;
            z-index: 5;
            padding: 0 20px 150px;
            -webkit-overflow-scrolling: touch;
        }

        .station-card {
            display: flex;
            align-items: center;
            padding: 15px;
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            margin-bottom: 12px;
            border: 1px solid rgba(255,255,255,0.05);
            transition: transform 0.2s;
        }

        .station-card:active { transform: scale(0.97); }

        .station-card.active {
            border-color: var(--accent);
            background: rgba(255, 94, 58, 0.1);
        }

        .thumb {
            width: 50px;
            height: 50px;
            border-radius: 10px;
            margin-right: 15px;
            object-fit: cover;
        }

        .info { flex: 1; overflow: hidden; }
        .info h4 { font-size: 16px; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .info p { font-size: 12px; color: #aaa; text-transform: uppercase; }

        /* Player View (Overlay) */
        #player-overlay {
            position: absolute;
            inset: 0;
            z-index: 20;
            background: #000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding-bottom: calc(var(--safe-bottom) + 100px);
        }

        .art-work {
            width: 280px;
            height: 280px;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            margin-bottom: 40px;
            object-fit: cover;
        }

        .player-text { text-align: center; margin-bottom: 40px; padding: 0 30px; }
        .player-text h2 { font-size: 28px; font-weight: 900; margin-bottom: 10px; }
        .player-text p { color: var(--accent); font-weight: 600; letter-spacing: 1px; }

        /* Navigație de Jos */
        nav {
            position: absolute;
            bottom: calc(var(--safe-bottom) + 20px);
            left: 20px; right: 20px;
            height: 70px;
            background: rgba(20,20,20,0.9);
            backdrop-filter: blur(20px);
            border-radius: 35px;
            display: flex;
            align-items: center;
            z-index: 100;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 0 10px;
        }

        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #666;
            font-size: 10px;
            font-weight: 700;
        }

        .nav-item.active { color: #fff; }
        .nav-item.active i { color: var(--accent); }

        /* Floating Play Button */
        .mini-player {
            position: absolute;
            right: 20px;
            bottom: calc(var(--safe-bottom) + 100px);
            width: 60px;
            height: 60px;
            background: #fff;
            color: #000;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 90;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: all 0.3s;
        }

        .mini-player.playing { background: var(--accent); color: #fff; transform: scale(1.1); }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .loading-spin { animation: rotate 1s linear infinite; }
    </style>
</head>
<body>

<div class="app-shell">
    <div class="bg-engine">
        <div id="bg1" class="bg-layer" style="opacity:1;"></div>
        <div id="bg2" class="bg-layer"></div>
    </div>

    <header>
        <div class="tabs-container">
            <div class="tab active" onclick="filterList('mine', this)">Owned</div>
            <div class="tab" onclick="filterList('fav', this)">Favorites</div>
            <div class="tab" onclick="filterList('russian', this)">Russian</div>
            <div class="tab" onclick="filterList('all', this)">All Stations</div>
        </div>
    </header>

    <main class="main-scroll" id="station-container"></main>

    <div id="player-overlay">
        <img id="big-art" src="" class="art-work">
        <div class="player-text">
            <h2 id="p-name">Selectează Radio</h2>
            <p id="p-desc">Ready to play</p>
        </div>
        <div style="display:flex; gap:30px; align-items:center;">
            <i data-lucide="skip-back" size="32" onclick="changeStation(-1)"></i>
            <div id="main-play-btn" style="width:80px; height:80px; background:#fff; color:#000; border-radius:40px; display:flex; align-items:center; justify-content:center;" onclick="toggleAudio()">
                <i data-lucide="play" fill="currentColor" size="32"></i>
            </div>
            <i data-lucide="skip-forward" size="32" onclick="changeStation(1)"></i>
        </div>
    </div>

    <div class="mini-player" id="fab" onclick="toggleAudio()">
        <i data-lucide="play" fill="currentColor"></i>
    </div>

    <nav>
        <div class="nav-item active" onclick="showView('list', this)">
            <i data-lucide="layout-list"></i>
            <span>RADIO</span>
        </div>
        <div class="nav-item" onclick="showView('player', this)">
            <i data-lucide="music"></i>
            <span>PLAYER</span>
        </div>
    </nav>
</div>

<audio id="core-audio" crossorigin="anonymous" playsinline></audio>

<script>
    // Datele aplicației
    const stations = [
        { name: "Muzică 10s", stream: "https://sergiumusic.duckdns.org/muzicaveche", img: "https://i.ibb.co/6R0D9Jg/childhood.jpg", desc: "Sergiu | Childhood", isMine: true, isAll: true },
        { name: "Hope", stream: "https://sergiumusic.duckdns.org/hope", img: "https://i.ibb.co/VqhK7z5/hope.jpg", desc: "Sergiu | Lovefool Pop", isMine: true, isFav: true, isAll: true },
        { name: "Emisiuni 10s", stream: "https://sergiumusic.duckdns.org/emisiunivechi", img: "https://i.ibb.co/0f7M6vS/shows.jpg", desc: "Sergiu | Radio Archive", isMine: true, isAll: true },
        { name: "Radio Record", stream: "https://radiorecord.hostingradio.ru/rus96.aacp", img: "https://is1-ssl.mzstatic.com/image/thumb/Podcasts221/v4/0e/fe/53/0efe532a-3cee-6c89-1d8d-c9f18284c0f2/mza_5165669991707061934.jpg/1000x1000bb.jpg", desc: "Russian Dance Mix", isRussian: true, isAll: true },
        { name: "Heart 10s", stream: "https://media-ice.musicradio.com/Heart10sMP3", img: "https://images.weserv.nl/?url=www.globalplayer.com/assets/track-placeholders/heart10s.png", desc: "Classic Hits", isAll: true, isFav: true }
    ];

    let currentList = [];
    let currentIdx = 0;
    let bgToggle = true;
    const audio = document.getElementById('core-audio');

    // Inițializare
    function init() {
        filterList('mine', document.querySelector('.tab'));
        lucide.createIcons();
        setupAudioListeners();
        
        // Previne scroll-ul pe tot body-ul (fix iOS)
        document.addEventListener('touchmove', (e) => {
            if (!e.target.closest('.main-scroll')) e.preventDefault();
        }, { passive: false });
    }

    function filterList(type, el) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        
        currentList = stations.filter(s => s[type === 'all' ? 'isAll' : 'is' + type.charAt(0).toUpperCase() + type.slice(1)]);
        render();
    }

    function render() {
        const container = document.getElementById('station-container');
        container.innerHTML = currentList.map((s, i) => `
            <div class="station-card ${currentIdx === i && audio.src ? 'active' : ''}" onclick="selectStation(${i})">
                <img src="${s.img}" class="thumb">
                <div class="info">
                    <h4>${s.name}</h4>
                    <p>${s.desc}</p>
                </div>
                ${currentIdx === i && !audio.paused ? '<i data-lucide="volume-2" class="accent"></i>' : ''}
            </div>
        `).join('');
        lucide.createIcons();
    }

    function selectStation(i) {
        currentIdx = i;
        const s = currentList[i];
        
        audio.src = s.stream;
        audio.play().catch(err => console.log("Unlock audio required"));
        
        updatePlayerUI(s);
        updateBackground(s.img);
        render();
    }

    function toggleAudio() {
        if (audio.paused) audio.play();
        else audio.pause();
    }

    function updatePlayerUI(s) {
        document.getElementById('big-art').src = s.img;
        document.getElementById('p-name').innerText = s.name;
        document.getElementById('p-desc').innerText = s.desc;
    }

    function updateBackground(img) {
        const active = bgToggle ? 'bg1' : 'bg2';
        const inactive = bgToggle ? 'bg2' : 'bg1';
        document.getElementById(active).style.backgroundImage = `url(${img})`;
        document.getElementById(active).style.opacity = "1";
        document.getElementById(inactive).style.opacity = "0";
        bgToggle = !bgToggle;
    }

    function showView(view, el) {
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('player-overlay').style.display = view === 'player' ? 'flex' : 'none';
        document.getElementById('fab').style.display = view === 'player' ? 'none' : 'flex';
    }

    function changeStation(dir) {
        currentIdx = (currentIdx + dir + currentList.length) % currentList.length;
        selectStation(currentIdx);
    }

    function setupAudioListeners() {
        audio.onplay = () => updateAllIcons(true);
        audio.onpause = () => updateAllIcons(false);
        audio.onwaiting = () => {
            document.getElementById('main-play-btn').innerHTML = '<i data-lucide="loader-2" class="loading-spin"></i>';
            lucide.createIcons();
        };
    }

    function updateAllIcons(playing) {
        const icon = playing ? 'pause' : 'play';
        const fab = document.getElementById('fab');
        fab.classList.toggle('playing', playing);
        fab.innerHTML = `<i data-lucide="${icon}" fill="currentColor"></i>`;
        document.getElementById('main-play-btn').innerHTML = `<i data-lucide="${icon}" fill="currentColor" size="32"></i>`;
        lucide.createIcons();
        render(); // Refresh list icons
    }

    init();
</script>
</body>
</html>
