<style>
:root {
    --accent: #ff5e3a;
    --glass: rgba(255, 255, 255, 0.1);
    --bg-dark: #000000;
}

* { 
    box-sizing: border-box; 
    margin: 0; padding: 0; 
    font-family: 'Inter', sans-serif; 
    -webkit-tap-highlight-color: transparent; 
    -webkit-user-select: none;
    user-select: none;
    overscroll-behavior: none;
}

body { 
    background: var(--bg-dark); 
    color: white; 
    /* Ocupă tot ecranul, inclusiv zona de sub status bar */
    height: 100dvh; 
    width: 100vw;
    overflow: hidden; 
    position: fixed;
}

.app-container {
    width: 100%; height: 100%; position: relative; overflow: hidden;
    display: flex; flex-direction: column;
    /* Adaugă padding automat pentru notch-ul de la iPhone */
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
}

/* --- Stiluri Fundal Animat --- */
.bg-blur {
    position: absolute; 
    top: -10%; left: -10%; width: 120%; height: 120%;
    background-size: cover; background-position: center;
    filter: blur(40px) brightness(0.3) saturate(1.5);
    z-index: 0; transition: opacity 2s ease-in-out;
}

/* --- Layout Zone --- */
.header-tabs { 
    position: relative; z-index: 10; 
    padding: 20px 20px 10px; 
    display: flex; gap: 10px; overflow-x: auto; 
}

.tab { 
    background: var(--glass); padding: 8px 18px; border-radius: 20px; 
    font-size: 13px; backdrop-filter: blur(10px); 
    border: 1px solid rgba(255,255,255,0.1); font-weight: 500;
}
.tab.active { background: var(--accent); border-color: transparent; }

.content { 
    position: relative; z-index: 10; flex: 1; 
    padding: 0 20px 160px; overflow-y: auto; 
}

/* --- Player UI --- */
#player-view { 
    display: none; position: relative; z-index: 10; height: 100%; 
    flex-direction: column; align-items: center; justify-content: space-evenly; 
    padding-bottom: 120px; 
}

.art-container { 
    width: 80vw; height: 80vw; max-width: 320px; max-height: 320px; 
    position: relative; 
}
.main-art { 
    width: 100%; height: 100%; border-radius: 24px; 
    box-shadow: 0 20px 50px rgba(0,0,0,0.5); object-fit: cover;
}

.main-controls { display: flex; align-items: center; gap: 30px; }
.btn-round { 
    background: var(--glass); width: 60px; height: 60px; border-radius: 50%; 
    display: flex; align-items: center; justify-content: center; color: white;
    backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1);
}
.btn-play { background: #fff; color: #000; width: 80px; height: 80px; }
.btn-play.playing { background: var(--accent); color: white; }

/* --- Navigare de jos (Stil iOS) --- */
.nav-bar { 
    position: absolute; bottom: 30px; left: 20px; right: 20px; z-index: 100; 
    background: rgba(20,20,20,0.85); backdrop-filter: blur(20px); 
    border-radius: 30px; display: flex; padding: 10px; 
    border: 1px solid rgba(255,255,255,0.1); 
}
.nav-link { 
    flex: 1; display: flex; flex-direction: column; align-items: center; 
    gap: 4px; color: #888; font-size: 10px; text-transform: uppercase;
}
.nav-link.active { color: #fff; }
.nav-link.active i { color: var(--accent); }

.spin { animation: spin 1s linear infinite; }
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
</style>
</head>

<body>
<div class="app-container">
    <div class="bg-blur" id="bg-1" style="opacity:1;"></div>
    <div class="bg-blur" id="bg-2" style="opacity:0;"></div>

    <div id="list-view" style="display: flex; flex-direction: column; height: 100%;">
        <div class="header-tabs">
            <div class="tab active" onclick="renderList('all', this)">Toate</div>
            <div class="tab" onclick="renderList('fav', this)">Favorite</div>
            <div class="tab" onclick="renderList('russian', this)">Rusești</div>
        </div>
        <div class="content" id="stations-list"></div>
    </div>

    <div id="player-view">
        <div class="art-container">
            <img src="" class="main-art" id="p-img" onerror="this.src='https://via.placeholder.com/500x500?text=Radio'">
        </div>
        <div style="text-align: center; padding: 0 20px;">
            <h2 id="p-name" style="font-size: 24px;">Alege un post</h2>
            <p id="p-desc" style="color: #bbb; margin-top: 8px; font-size: 14px;">Sergiu FM</p>
        </div>
        <div class="main-controls">
            <div class="btn-round" onclick="prev()"><i data-lucide="skip-back" fill="currentColor"></i></div>
            <div class="btn-round btn-play" id="play-btn" onclick="togglePlay()"><i data-lucide="play" fill="currentColor"></i></div>
            <div class="btn-round" onclick="next()"><i data-lucide="skip-forward" fill="currentColor"></i></div>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-link active" id="n-list" onclick="switchTab('list')">
            <i data-lucide="layout-list"></i><span>Posturi</span>
        </div>
        <div class="nav-link" id="n-player" onclick="switchTab('player')">
            <i data-lucide="disc"></i><span>Player</span>
        </div>
    </div>
</div>

<audio id="audio-engine" crossorigin="anonymous"></audio>

<script>
// --- Service Worker (Înregistrare pentru PWA) ---
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('data:text/javascript;base64,c2VsZi5hZGRFdmVudExpc3RlbmVyKCdmZXRjaCcsIGV2ID0+IHsgcmV0dXJuOyB9KTs=');
}

const stations = [
    { name: "Heart 10s", stream: "https://media-ice.musicradio.com/Heart10sMP3", img: "https://images.weserv.nl/?url=www.globalplayer.com/assets/track-placeholders/heart10s.png", desc: "POP HITS", isFav: true },
    { name: "Kiss 10s", stream: "https://dc.digi.live.kissfm.ro/kiss.hits.from.the.10s/listen.m3u", img: "https://api.kissfm.ro/resized/streams/homepage/2025/01/10/cover-kiss-hits-from-the-10s_6210a8bb4e6b58d8b6d2c0342721cdb9.png", desc: "ROMANIA HITS", isFav: true },
    { name: "Radio Record", stream: "https://radiorecord.hostingradio.ru/rus96.aacp", img: "https://is1-ssl.mzstatic.com/image/thumb/Podcasts221/v4/0e/fe/53/0efe532a-3cee-6c89-1d8d-c9f18284c0f2/mza_5165669991707061934.jpg/1200x1200bf-60.jpg", desc: "RUSSIAN DANCE", isRussian: true },
    { name: "Маруся ФМ", stream: "https://radio-holding.ru:9433/marusya_default", img: "https://cover.marus.fm/cover/default.jpg", desc: "RUSSIAN POP", isRussian: true }
];

let currentIdx = 0;
let filtered = [...stations];
const audio = document.getElementById('audio-engine');

function init() {
    renderList('all');
    lucide.createIcons();
    
    // Media Session pentru lock screen
    audio.onplay = () => updateUI(true);
    audio.onpause = () => updateUI(false);
    audio.onwaiting = () => { document.getElementById('play-btn').innerHTML = '<i data-lucide="loader-2" class="spin"></i>'; lucide.createIcons(); };
}

function renderList(mode, el) {
    if(el) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
    }
    filtered = stations.filter(s => {
        if(mode === 'fav') return s.isFav;
        if(mode === 'russian') return s.isRussian;
        return true;
    });

    const list = document.getElementById('stations-list');
    list.innerHTML = filtered.map((s, i) => `
        <div class="station-item" onclick="selectStation(${i})" style="display:flex; align-items:center; padding:15px 0; border-bottom:1px solid rgba(255,255,255,0.05);">
            <img src="${s.img}" style="width:50px; height:50px; border-radius:10px; margin-right:15px;">
            <div>
                <div style="font-weight:600;">${s.name}</div>
                <div style="font-size:12px; color:#888;">${s.desc}</div>
            </div>
        </div>
    `).join('');
}

function selectStation(i) {
    currentIdx = i;
    const s = filtered[currentIdx];
    audio.src = s.stream;
    audio.play();
    updatePlayerUI();
    switchTab('player');
}

function updatePlayerUI() {
    const s = filtered[currentIdx];
    document.getElementById('p-img').src = s.img;
    document.getElementById('p-name').innerText = s.name;
    document.getElementById('p-desc').innerText = s.desc;
    document.getElementById('bg-1').style.backgroundImage = `url(${s.img})`;
    
    if ('mediaSession' in navigator) {
        navigator.mediaSession.metadata = new MediaMetadata({
            title: s.name, artist: s.desc, artwork: [{ src: s.img, sizes: '512x512', type: 'image/png' }]
        });
    }
}

function togglePlay() { audio.paused ? audio.play() : audio.pause(); }
function next() { currentIdx = (currentIdx + 1) % filtered.length; selectStation(currentIdx); }
function prev() { currentIdx = (currentIdx - 1 + filtered.length) % filtered.length; selectStation(currentIdx); }

function switchTab(t) {
    document.getElementById('list-view').style.display = t === 'list' ? 'flex' : 'none';
    document.getElementById('player-view').style.display = t === 'player' ? 'flex' : 'none';
    document.getElementById('n-list').classList.toggle('active', t === 'list');
    document.getElementById('n-player').classList.toggle('active', t === 'player');
}

function updateUI(playing) {
    const btn = document.getElementById('play-btn');
    btn.innerHTML = playing ? '<i data-lucide="pause" fill="currentColor"></i>' : '<i data-lucide="play" fill="currentColor"></i>';
    btn.classList.toggle('playing', playing);
    lucide.createIcons();
}

init();
</script>
</body>
</html>
