<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Player App</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-color: #0d0d0d;
            --card-bg: rgba(255, 255, 255, 0.08);
            --accent-color: #ff5e3a;
            --text-main: #ffffff;
            --text-secondary: #b3b3b3;
            --glass: rgba(30, 30, 30, 0.6);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
        }

        /* Containerul principal - stil mobil */
        .app-container {
            width: 100%;
            max-width: 430px;
            height: 100%;
            position: relative;
            background: #000;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Fundal Dinamic Blur */
        .dynamic-bg {
            position: absolute;
            top: -20%;
            left: -20%;
            width: 140%;
            height: 140%;
            background-size: cover;
            background-position: center;
            filter: blur(60px) brightness(0.4);
            transform: rotate(30deg);
            z-index: 0;
            transition: background-image 0.5s ease;
        }

        /* Header / Tabs */
        .tabs {
            position: relative;
            z-index: 10;
            padding: 20px;
            display: flex;
            gap: 10px;
            overflow-x: auto;
        }

        .tab {
            background: var(--card-bg);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            white-space: nowrap;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .tab.active {
            background: var(--accent-color);
        }

        /* Content Area */
        .content {
            position: relative;
            z-index: 10;
            flex: 1;
            padding: 0 20px;
            overflow-y: auto;
        }

        /* List Item Stil 1:1 */
        .station-card {
            display: flex;
            align-items: center;
            padding: 15px 0;
            border-bottom: 0.5px solid rgba(255,255,255,0.1);
            cursor: pointer;
        }

        .station-img {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            margin-right: 15px;
            object-fit: cover;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .station-info {
            flex: 1;
        }

        .station-name {
            font-weight: 600;
            font-size: 16px;
        }

        .station-tags {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .station-meta {
            font-size: 10px;
            color: var(--text-secondary);
            display: flex;
            gap: 10px;
            margin-top: 5px;
            text-transform: uppercase;
        }

        /* Player View - Ascuns inițial */
        #player-view {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            height: 100%;
        }

        .main-art {
            width: 280px;
            height: 280px;
            border-radius: 20px;
            margin-bottom: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            object-fit: cover;
        }

        .player-controls {
            width: 100%;
            padding: 0 40px;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
            margin: 20px 0;
            position: relative;
        }

        .progress-fill {
            width: 40%;
            height: 100%;
            background: #fff;
            border-radius: 2px;
        }

        /* Bottom Nav - Glassmorphism */
        .bottom-nav {
            position: relative;
            z-index: 20;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            margin: 20px;
            border-radius: 40px;
            display: flex;
            justify-content: space-around;
            padding: 10px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 10px;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 8px 20px;
            border-radius: 30px;
            transition: 0.3s;
        }

        .nav-item.active {
            background: rgba(255,255,255,0.15);
            color: var(--accent-color);
        }

        /* Pop-up Menu */
        .popup-menu {
            position: absolute;
            bottom: 100px;
            right: 20px;
            width: 240px;
            background: rgba(30, 30, 30, 0.95);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            display: none;
            z-index: 100;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .menu-item {
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            border-bottom: 0.5px solid rgba(255,255,255,0.1);
            cursor: pointer;
        }

        .menu-item:hover { background: rgba(255,255,255,0.1); }

        /* Floating Add Button */
        .fab {
            position: absolute;
            bottom: 100px;
            right: 30px;
            background: var(--accent-color);
            width: 56px;
            height: 56px;
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 20px rgba(255, 94, 58, 0.4);
            cursor: pointer;
            z-index: 15;
        }

        .heart-icon.active {
            fill: #ff3b30;
            color: #ff3b30;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="dynamic-bg" id="bg-blur"></div>

    <div id="list-view" style="height: 100%; display: flex; flex-direction: column;">
        <div class="tabs">
            <div class="tab active">Favorites</div>
            <div class="tab">Recent</div>
            <div class="tab">Local</div>
            <div class="tab">All</div>
        </div>
        
        <div class="content" id="station-list">
            </div>

        <div class="fab" onclick="alert('Add Custom Radio URL')">
            <i data-lucide="plus"></i>
        </div>
    </div>

    <div id="player-view">
        <img src="" alt="Station Art" class="main-art" id="player-art">
        <h2 id="player-name">Select a Station</h2>
        <p id="player-desc" style="color: var(--text-secondary); margin-bottom: 20px;"></p>
        
        <div class="player-controls">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
                <i data-lucide="skip-back" style="opacity: 0.5"></i>
                <div id="play-btn" style="background: #fff; color: #000; padding: 15px; border-radius: 50%; cursor: pointer;" onclick="toggleAudio()">
                    <i data-lucide="play" fill="black"></i>
                </div>
                <i data-lucide="skip-forward" style="opacity: 0.5"></i>
            </div>
            
            <div style="display: flex; justify-content: space-around; opacity: 0.8;">
                <i data-lucide="heart" class="heart-icon"></i>
                <i data-lucide="plus"></i>
                <i data-lucide="volume-2"></i>
                <i data-lucide="clock"></i>
                <i data-lucide="more-horizontal" onclick="toggleMenu()"></i>
            </div>
        </div>
    </div>

    <div class="popup-menu" id="options-menu">
        <div class="menu-item" onclick="searchYoutube()"><i data-lucide="youtube"></i> Search Song on YouTube</div>
        <div class="menu-item" onclick="copyInfo()"><i data-lucide="copy"></i> Copy Song Info</div>
        <div class="menu-item" onclick="openHomepage()"><i data-lucide="globe"></i> Open Station Homepage</div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item" onclick="showView('list')">
            <i data-lucide="radio"></i>
            <span>Radio</span>
        </div>
        <div class="nav-item active" onclick="showView('player')">
            <i data-lucide="play-circle"></i>
            <span>Player</span>
        </div>
        <div class="nav-item" onclick="alert('Settings')">
            <i data-lucide="settings"></i>
            <span>Settings</span>
        </div>
    </div>
</div>

<audio id="radio-audio"></audio>

<script>
    const stations = [
        {
            name: "ONE FM DANCE STATION",
            url: "https://live.onefm.ro/onefm.aacp",
            img: "https://onefm.es/wp-content/uploads/2023/09/LOGO-2025.jpg",
            desc: "DANCE, ELECTRONIC, HOUSE, TECHNO",
            country: "ROMANIA",
            meta: "HTTPS • AAC • 88 kbps"
        },
        {
            name: "HEART 10S",
            url: "https://media-ice.musicradio.com/Heart10sMP3",
            img: "https://images.weserv.nl/?url=www.globalplayer.com/assets/track-placeholders/heart10s.png",
            desc: "POP, HITS, CHART, 80S, 90S",
            country: "UNITED KINGDOM",
            meta: "HTTPS • MP3 • 128 kbps"
        }
    ];

    let currentStation = null;
    const audio = document.getElementById('radio-audio');

    function init() {
        const listContainer = document.getElementById('station-list');
        stations.forEach((s, index) => {
            const card = document.createElement('div');
            card.className = 'station-card';
            card.innerHTML = `
                <img src="${s.img}" class="station-img">
                <div class="station-info">
                    <div class="station-name">${s.name}</div>
                    <div class="station-tags">${s.desc}</div>
                    <div class="station-meta"><span>${s.country}</span> <span>${s.meta}</span></div>
                </div>
                <i data-lucide="heart" style="color: var(--accent-color)"></i>
            `;
            card.onclick = () => selectStation(index);
            listContainer.appendChild(card);
        });
        lucide.createIcons();
        // Seteaza prima statie default
        selectStation(0, false);
    }

    function selectStation(index, autoPlay = true) {
        currentStation = stations[index];
        document.getElementById('player-art').src = currentStation.img;
        document.getElementById('bg-blur').style.backgroundImage = `url(${currentStation.img})`;
        document.getElementById('player-name').innerText = currentStation.name;
        document.getElementById('player-desc').innerText = currentStation.desc;
        
        audio.src = currentStation.url;
        if(autoPlay) {
            audio.play();
            updatePlayIcon(true);
            showView('player');
        }
    }

    function toggleAudio() {
        if (audio.paused) {
            audio.play();
            updatePlayIcon(true);
        } else {
            audio.pause();
            updatePlayIcon(false);
        }
    }

    function updatePlayIcon(isPlaying) {
        const btn = document.getElementById('play-btn');
        btn.innerHTML = isPlaying ? '<i data-lucide="pause" fill="black"></i>' : '<i data-lucide="play" fill="black"></i>';
        lucide.createIcons();
    }

    function showView(view) {
        document.getElementById('list-view').style.display = view === 'list' ? 'flex' : 'none';
        document.getElementById('player-view').style.display = view === 'player' ? 'flex' : 'none';
        
        const navItems = document.querySelectorAll('.nav-item');
        navItems[0].classList.toggle('active', view === 'list');
        navItems[1].classList.toggle('active', view === 'player');
    }

    function toggleMenu() {
        const menu = document.getElementById('options-menu');
        menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
    }

    // Functii pentru meniu
    function searchYoutube() {
        window.open(`https://www.youtube.com/results?search_query=${currentStation.name}`, '_blank');
    }

    function copyInfo() {
        navigator.clipboard.writeText(`${currentStation.name} - ${currentStation.desc}`);
        alert("Info copied to clipboard!");
    }

    function openHomepage() {
        alert("Redirecting to homepage...");
    }

    init();
</script>

</body>
</html>
