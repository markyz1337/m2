<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sergiu FM</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Sergiu FM">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#000000">
    
    <link rel="icon" href="favicon.png" type="image/png">
    <link rel="apple-touch-icon" href="icon-180.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --accent: #ff5e3a;
            --glass: rgba(255, 255, 255, 0.1);
            --bg-dark: #000000;
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        * { 
            box-sizing: border-box; 
            margin: 0; padding: 0; 
            font-family: 'Inter', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            -webkit-user-select: none;
            user-select: none;
            overscroll-behavior: none;
        }

        html, body {
            height: 100dvh;
            width: 100vw;
            background: var(--bg-dark);
            color: white;
            overflow: hidden;
            position: fixed; /* Previne scroll-ul elastic al paginii întregi pe iOS */
        }

        /* Aplicația ocupă tot ecranul, inclusiv sub status bar */
        .app-container {
            width: 100%; 
            max-width: 430px; 
            height: 100dvh; 
            margin: 0 auto;
            position: relative; 
            overflow: hidden;
            display: flex; 
            flex-direction: column;
            opacity: 0;
            transition: opacity 0.5s ease-in;
        }

        .app-ready .app-container { opacity: 1; }

        /* Background Layers */
        .bg-blur {
            position: absolute; 
            top: -10%; left: -10%; width: 120%; height: 120%;
            background-size: cover; 
            background-position: center;
            filter: blur(40px) brightness(0.3) saturate(1.4);
            z-index: 0; 
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
            will-change: opacity;
        }

        /* HEADER & TABS - Respectă Safe Area (Notch) */
        .header-tabs { 
            position: relative; z-index: 10; 
            padding: calc(var(--safe-top) + 15px) 20px 10px; 
            display: flex; gap: 10px; overflow-x: auto; 
        }

        .tab { 
            background: var(--glass); 
            padding: 8px 18px; 
            border-radius: 20px; 
            font-size: 13px; 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255,255,255,0.1); 
            cursor: pointer; 
            white-space: nowrap;
            font-weight: 800;
            transition: all 0.3s ease;
        }
        .tab.active { background: var(--accent); border-color: transparent; }

        /* CONTENT AREA */
        .content { 
            position: relative; 
            z-index: 10; 
            flex: 1; 
            padding: 0 20px calc(var(--safe-bottom) + 140px) 20px; 
            overflow-y: auto; 
            -webkit-overflow-scrolling: touch; 
        }

        .station-item { 
            display: flex; align-items: center; padding: 15px 0; 
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .station-thumb { 
            width: 55px; height: 55px; border-radius: 12px; margin-right: 15px; 
            object-fit: cover; background: #111; 
        }

        .station-name { font-weight: 600; font-size: 16px; margin-bottom: 4px; }
        .station-desc { font-size: 11px; color: #b3b3b3; text-transform: uppercase; }

        /* PLAYER VIEW */
        #player-view { 
            display: none; position: relative; z-index: 10; height: 100%; 
            flex-direction: column; align-items: center; justify-content: center; 
            padding-bottom: calc(var(--safe-bottom) + 100px);
        }

        .art-container { width: 280px; height: 280px; position: relative; margin-bottom: 30px; }
        .main-art { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            border-radius: 30px; box-shadow: 0 30px 60px rgba(0,0,0,0.7); object-fit: cover; 
            transition: opacity 1s ease, transform 1s ease;
        }
        .art-hidden { opacity: 0; transform: scale(0.9); }
        .art-visible { opacity: 1; transform: scale(1); }

        .track-viewport { width: 100%; overflow: hidden; margin-bottom: 30px; }
        .track-slider-wrapper { display: flex; width: 300%; transform: translateX(-33.333%); will-change: transform; }
        .track-info-slide { width: 33.333%; text-align: center; padding: 0 45px; }
        .track-info-slide h2 { font-size: 24px; font-weight: 800; margin-bottom: 8px; line-height: 1.2; }

        /* CONTROLS */
        .main-controls { display: flex; align-items: center; gap: 35px; }
        .btn-round { 
            background: var(--glass); width: 60px; height: 60px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); color: white;
        }
        .btn-play { background: #fff; color: #000; width: 75px; height: 75px; }
        .btn-play.playing { background: var(--accent); color: #fff; box-shadow: 0 0 30px rgba(255, 94, 58, 0.5); }

        /* NAV BAR - Sticky la baza ecranului (Dynamic Island aware) */
        .nav-bar { 
            position: absolute; bottom: calc(var(--safe-bottom) + 20px); left: 25px; right: 25px; 
            z-index: 50; background: rgba(25,25,25,0.8); backdrop-filter: blur(25px); 
            border-radius: 40px; display: flex; padding: 8px; border: 1px solid rgba(255,255,255,0.08);
            transform: translateY(100px); transition: transform 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .nav-bar.visible { transform: translateY(0); }
        .nav-link { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; color: #777; font-size: 10px; font-weight: 600; cursor: pointer; }
        .nav-link.active { color: #fff; }
        .nav-link.active i { color: var(--accent); }

        /* FAB */
        .fab { 
            position: absolute; bottom: calc(var(--safe-bottom) + 115px); right: 30px; 
            background: #fff; color: #000; width: 56px; height: 56px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; z-index: 40;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4); transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0; transform: scale(0.5);
        }
        .fab.visible { opacity: 1; transform: scale(1); }
        .fab.playing { background: var(--accent); color: #fff; }

        /* Animations */
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .spin { animation: spin 1s linear infinite; }

        /* Equalizer in List */
        .playing-icon { display: none; align-items: flex-end; gap: 2px; width: 20px; height: 20px; }
        .station-item.is-playing .playing-icon { display: flex; }
        .playing-icon span { width: 3px; background: var(--accent); border-radius: 2px; animation: bounce 0.5s infinite alternate; }
        @keyframes bounce { from { height: 4px; } to { height: 16px; } }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="app-container">
    <div class="bg-blur" id="bg-layer-1"></div>
    <div class="bg-blur" id="bg-layer-2"></div>

    <div id="list-view" style="height:100%; display:flex; flex-direction:column;">
        <div class="header-tabs">
            <div class="tab" id="tab-all" onclick="renderList('all', this)">All</div>
            <div class="tab" id="tab-fav" onclick="renderList('fav', this)">Favorites</div>
            <div class="tab active" id="tab-mine" onclick="renderList('mine', this)">Owned</div>
            <div class="tab" id="tab-russian" onclick="renderList('russian', this)">Russian</div>
        </div>
        <div class="content" id="stations-list"></div>
        <div class="fab" id="fab-play-pause" onclick="togglePlay()">
            <i data-lucide="play" fill="currentColor"></i>
        </div>
    </div> 

    <div id="player-view">
        <div class="art-container" id="swipe-zone-art">
            <img src="" class="main-art art-visible" id="player-img-1">
            <img src="" class="main-art art-hidden" id="player-img-2">
        </div>
        <div class="track-viewport" id="swipe-zone-text">
            <div class="track-slider-wrapper" id="info-wrapper">
                <div class="track-info-slide" id="slide-prev"><h2>-</h2><p>-</p></div>
                <div class="track-info-slide" id="slide-current"><h2>Alege un post</h2><p>Radio Player</p></div>
                <div class="track-info-slide" id="slide-next"><h2>-</h2><p>-</p></div>
            </div>
        </div>
        <div class="main-controls">
            <div class="btn-round" onclick="prev()"><i data-lucide="skip-back" fill="currentColor"></i></div>
            <div class="btn-round btn-play" id="play-trigger" onclick="togglePlay()"><i data-lucide="play" fill="currentColor"></i></div>
            <div class="btn-round" onclick="next()"><i data-lucide="skip-forward" fill="currentColor"></i></div>
        </div>
    </div>

    <div class="nav-bar" id="main-nav">
        <div class="nav-link active" id="nav-list" onclick="switchTab('list')">
            <i data-lucide="radio"></i><span>Radio</span>
        </div>
        <div class="nav-link" id="nav-player" onclick="switchTab('player')">
            <i data-lucide="play-circle"></i><span>Player</span>
        </div>
    </div>
</div>

<audio id="audio-engine" preload="auto" crossorigin="anonymous" playsinline></audio>

<script>
/** --- CONFIG & DATA --- **/
let currentIdx = 0;
let currentFilteredList = [];
let activeStationObject = null;
let isTransitioning = false;
let activeArtLayer = 1;

const audio = document.getElementById('audio-engine');
const FALLBACK_IMG = "https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?q=80&w=1000&auto=format&fit=crop";

const stations = [
    { name: "Muzică 10s", stream: "https://sergiumusic.duckdns.org/muzicaveche", img: "https://i.ibb.co/6R0D9Jg/childhood.jpg", desc: "Sergiu | Childhood", isMine: true, isAll: true },
    { name: "Hope", stream: "https://sergiumusic.duckdns.org/hope", img: "https://i.ibb.co/VqhK7z5/hope.jpg", desc: "Sergiu | Lovefool Pop", isMine: true, isFav: true, isAll: true },
    { name: "Emisiuni 10s", stream: "https://sergiumusic.duckdns.org/emisiunivechi", img: "https://i.ibb.co/0f7M6vS/shows.jpg", desc: "Sergiu | Radio Archive", isMine: true, isAll: true },
    { name: "Radio Record", stream: "https://radiorecord.hostingradio.ru/rus96.aacp", img: "https://is1-ssl.mzstatic.com/image/thumb/Podcasts221/v4/0e/fe/53/0efe532a-3cee-6c89-1d8d-c9f18284c0f2/mza_5165669991707061934.jpg/1000x1000bb.jpg", desc: "Russian Dance Mix", isRussian: true, isAll: true },
    { name: "Heart 10s", stream: "https://media-ice.musicradio.com/Heart10sMP3", img: "https://images.weserv.nl/?url=www.globalplayer.com/assets/track-placeholders/heart10s.png", desc: "Classic Hits", isAll: true, isFav: true }
];

/** --- CORE LOGIC --- **/
function init() {
    renderList('mine', document.getElementById('tab-mine'));
    document.body.classList.add('app-ready');
    
    setTimeout(() => {
        document.getElementById('main-nav').classList.add('visible');
        document.getElementById('fab-play-pause').classList.add('visible');
    }, 500);

    lucide.createIcons();
    setupMediaSession();
}

function renderList(mode, el) {
    const list = document.getElementById('stations-list');
    if (el) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
    }
    
    list.innerHTML = "";
    const key = `is${mode.charAt(0).toUpperCase() + mode.slice(1)}`;
    currentFilteredList = stations.filter(s => s[key] || mode === 'all');

    currentFilteredList.forEach((s, index) => {
        const item = document.createElement('div');
        item.className = `station-item ${activeStationObject?.name === s.name ? 'is-playing' : ''}`;
        item.setAttribute('data-name', s.name);
        item.innerHTML = `
            <img src="${s.img}" class="station-thumb">
            <div style="flex:1">
                <div class="station-name">${s.name}</div>
                <div class="station-desc">${s.desc}</div>
            </div>
            <div class="playing-icon"><span></span><span></span><span></span></div>
        `;
        item.onclick = () => {
            currentIdx = index;
            playStation();
        };
        list.appendChild(item);
    });
}

function playStation() {
    const s = currentFilteredList[currentIdx];
    activeStationObject = s;
    audio.src = s.stream;
    audio.play();
    updateArtUI(s.img);
    updateSliderText();
    updateUI(true);
}

function togglePlay() {
    if (audio.paused) {
        if (!audio.src) playStation();
        else audio.play();
    } else {
        audio.pause();
    }
}

function updateUI(isPlaying) {
    const btn = document.getElementById('play-trigger');
    const fab = document.getElementById('fab-play-pause');
    const icon = isPlaying ? 'pause' : 'play';
    
    [btn, fab].forEach(el => {
        el.innerHTML = `<i data-lucide="${icon}" fill="currentColor"></i>`;
        isPlaying ? el.classList.add('playing') : el.classList.remove('playing');
    });
    
    document.querySelectorAll('.station-item').forEach(item => {
        item.classList.toggle('is-playing', isPlaying && item.getAttribute('data-name') === activeStationObject?.name);
    });
    
    lucide.createIcons();
}

function updateArtUI(img) {
    const art1 = document.getElementById('player-img-1');
    const art2 = document.getElementById('player-img-2');
    const bg1 = document.getElementById('bg-layer-1');
    const bg2 = document.getElementById('bg-layer-2');

    if (activeArtLayer === 1) {
        art2.src = img;
        art2.classList.replace('art-hidden', 'art-visible');
        art1.classList.replace('art-visible', 'art-hidden');
        bg2.style.backgroundImage = `url(${img})`;
        bg2.style.opacity = "1";
        bg1.style.opacity = "0";
        activeArtLayer = 2;
    } else {
        art1.src = img;
        art1.classList.replace('art-hidden', 'art-visible');
        art2.classList.replace('art-visible', 'art-hidden');
        bg1.style.backgroundImage = `url(${img})`;
        bg1.style.opacity = "1";
        bg2.style.opacity = "0";
        activeArtLayer = 1;
    }
}

function switchTab(t) {
    const isPlayer = t === 'player';
    document.getElementById('list-view').style.display = isPlayer ? 'none' : 'flex';
    document.getElementById('player-view').style.display = isPlayer ? 'flex' : 'none';
    document.getElementById('nav-list').classList.toggle('active', !isPlayer);
    document.getElementById('nav-player').classList.toggle('active', isPlayer);
    document.getElementById('fab-play-pause').style.display = isPlayer ? 'none' : 'flex';
}

function updateSliderText() {
    const current = currentFilteredList[currentIdx];
    const prevIdx = (currentIdx - 1 + currentFilteredList.length) % currentFilteredList.length;
    const nextIdx = (currentIdx + 1) % currentFilteredList.length;

    document.getElementById('slide-current').querySelector('h2').innerText = current.name;
    document.getElementById('slide-current').querySelector('p').innerText = current.desc;
    document.getElementById('slide-prev').querySelector('h2').innerText = currentFilteredList[prevIdx].name;
    document.getElementById('slide-next').querySelector('h2').innerText = currentFilteredList[nextIdx].name;
}

function next() {
    currentIdx = (currentIdx + 1) % currentFilteredList.length;
    playStation();
}

function prev() {
    currentIdx = (currentIdx - 1 + currentFilteredList.length) % currentFilteredList.length;
    playStation();
}

/** --- SYSTEM INTEGRATION --- **/
function setupMediaSession() {
    if ('mediaSession' in navigator) {
        navigator.mediaSession.setActionHandler('play', () => audio.play());
        navigator.mediaSession.setActionHandler('pause', () => audio.pause());
        navigator.mediaSession.setActionHandler('previoustrack', () => prev());
        navigator.mediaSession.setActionHandler('nexttrack', () => next());
    }
}

audio.addEventListener('playing', () => updateUI(true));
audio.addEventListener('pause', () => updateUI(false));
audio.addEventListener('waiting', () => {
    document.getElementById('play-trigger').innerHTML = `<i data-lucide="loader-2" class="spin"></i>`;
    lucide.createIcons();
});

// PWA Service Worker (pentru offline și viteză)
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
}

window.onload = init;
</script>
</body>
</html>
