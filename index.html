<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Radio Player Full Screen</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
:root {
    --accent: #ff5e3a;
    --glass: rgba(255, 255, 255, 0.1);
    --bg-dark: #000000;
}
* { 
    box-sizing: border-box; 
    margin:0; padding:0; 
    font-family:'Inter',sans-serif; 
    -webkit-tap-highlight-color:transparent; 
}

html, body { 
    background: var(--bg-dark); 
    color: white; 
    height: 100%; 
    width: 100%;
    overflow: hidden; 
    position: fixed; /* Previne scroll-ul accidental al întregii pagini pe iOS */
}

/* CONTAINERUL PRINCIPAL - Ocupă tot ecranul fără excepție */
.app-container {
    width: 100%; 
    height: 100dvh; 
    position: absolute; 
    top: 0; left: 0;
    overflow: hidden;
    display: flex; 
    flex-direction: column;
    z-index: 1;
}

/* FUNDALUL - Întins la maxim pe tot ecranul */
.bg-blur {
    position: fixed; 
    top: 0; left: 0; right: 0; bottom: 0;
    width: 100vw; height: 100vh;
    background-size: cover; 
    background-position: center;
    filter: blur(60px) brightness(0.4); 
    z-index: 0;
    will-change: opacity;
    transition: opacity 1.5s ease-in-out;
}
#bg-layer-1 { opacity: 1; }
#bg-layer-2 { opacity: 0; }

/* HEADER - Împinge tab-urile sub ceasul iPhone-ului */
.header-tabs { 
    position: relative; 
    z-index: 10; 
    padding-top: calc(10px + env(safe-area-inset-top)); 
    padding-left: 20px; padding-right: 20px; padding-bottom: 10px;
    display: flex; 
    gap: 10px; 
    overflow-x: auto; 
}

.tab { 
    background: var(--glass); 
    padding: 8px 18px; 
    border-radius: 20px; 
    font-size: 13px; 
    backdrop-filter: blur(15px); 
    -webkit-backdrop-filter: blur(15px);
    border: 1px solid rgba(255,255,255,0.1); 
    cursor: pointer; 
    white-space: nowrap; 
}
.tab.active { background: var(--accent); border-color: transparent; }

/* LISTA - Se scurge până în marginea de jos */
.content { 
    position: relative; 
    z-index: 10; 
    flex: 1; 
    padding: 0 20px calc(150px + env(safe-area-inset-bottom)) 20px; 
    overflow-y: auto; 
    -webkit-overflow-scrolling: touch;
}

.station-item { 
    display: flex; 
    align-items: center; 
    padding: 15px 0; 
    border-bottom: 0.5px solid rgba(255,255,255,0.08); 
}
.station-thumb { width: 55px; height: 55px; border-radius: 12px; margin-right: 15px; object-fit: cover; background: #111; }

/* PLAYER VIEW */
#player-view { 
    display: none; 
    position: relative; 
    z-index: 10; 
    height: 100%; 
    flex-direction: column; 
    align-items: center; 
    justify-content: center; 
    padding-top: env(safe-area-inset-top);
    padding-bottom: calc(100px + env(safe-area-inset-bottom));
}

.art-container { width: 100%; display: flex; justify-content: center; margin-bottom: 30px; }
.main-art { width: 75vw; max-width: 300px; aspect-ratio: 1/1; border-radius: 25px; box-shadow: 0 25px 50px rgba(0,0,0,0.6); object-fit: cover; }

.track-viewport { width: 100%; overflow: hidden; margin-bottom: 30px; }
.track-slider-wrapper { display: flex; width: 300%; transform: translateX(-33.333%); transition: transform 0.3s ease-out; }
.track-info-slide { width: 33.333%; text-align: center; padding: 0 40px; }

/* NAV BAR - Plutește peste fundalul de jos */
.nav-bar { 
    position: absolute; 
    bottom: calc(20px + env(safe-area-inset-bottom)); 
    left: 20px; right: 20px; z-index: 50; 
    background: rgba(25,25,25,0.75); 
    backdrop-filter: blur(25px); 
    -webkit-backdrop-filter: blur(25px);
    border-radius: 40px; 
    display: flex; padding: 8px; 
    border: 1px solid rgba(255,255,255,0.1); 
}

.nav-bar::before {
    content: ''; position: absolute; top: 8px; left: 8px;
    width: calc(50% - 12px); height: calc(100% - 16px);
    background: rgba(255, 255, 255, 0.1); border-radius: 35px;
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: -1;
}
.nav-bar.on-radio::before { transform: translateX(100%); }
.nav-bar.on-player::before { transform: translateX(0%); }

.nav-link { flex:1; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 10px 0; color: #777; font-size: 11px; }
.nav-link.active { color: #fff; }
.nav-link.active i { color: var(--accent); }

.fab { 
    position: absolute; 
    bottom: calc(110px + env(safe-area-inset-bottom)); 
    right: 25px; 
    background: var(--accent); 
    width: 56px; height: 56px; border-radius: 50%; 
    display: flex; align-items: center; justify-content: center; z-index: 15; 
}
</style>
</head>
<body>

<div class="bg-blur" id="bg-layer-1"></div>
<div class="bg-blur" id="bg-layer-2"></div>

<div class="app-container">
    <div id="list-view" style="height:100%; display:flex; flex-direction:column;">
        <div class="header-tabs">
            <div class="tab" onclick="renderList('all', this)">All</div>
            <div class="tab active" id="tab-fav" onclick="renderList('fav', this)">Favorites</div>
            <div class="tab" onclick="renderList('mine', this)">Owned</div>
            <div class="tab" onclick="renderList('russian', this)">Russian</div>
        </div>
        <div class="content" id="stations-list"></div>
        <div class="fab" onclick="alert('Plus')"><i data-lucide="plus"></i></div>
    </div>

    <div id="player-view">
        <div class="art-container" id="swipe-zone-art">
            <img src="" class="main-art" id="player-img">
        </div>
        <div class="track-viewport" id="swipe-zone-text">
            <div class="track-slider-wrapper" id="info-wrapper">
                <div class="track-info-slide" id="slide-prev"><h2>Post</h2><p>Gen</p></div>
                <div class="track-info-slide" id="slide-current"><h2>Alege Post</h2><p>Radio</p></div>
                <div class="track-info-slide" id="slide-next"><h2>Post</h2><p>Gen</p></div>
            </div>
        </div>
        <div class="main-controls">
            <div class="btn-round" onclick="prev()"><i data-lucide="skip-back" fill="currentColor"></i></div>
            <div class="btn-round btn-play" id="play-trigger" onclick="togglePlay()"><i data-lucide="play" fill="currentColor"></i></div>
            <div class="btn-round" onclick="next()"><i data-lucide="skip-forward" fill="currentColor"></i></div>
        </div>
    </div>

    <div class="nav-bar on-radio" id="main-nav">
        <div class="nav-link" id="nav-player" onclick="switchTab('player')"><i data-lucide="play-circle"></i><span>Player</span></div>
        <div class="nav-link active" id="nav-list" onclick="switchTab('list')"><i data-lucide="radio"></i><span>Radio</span></div>
    </div>
</div>

<audio id="audio-engine"></audio>

<script>
// Păstrăm logica ta originală, dar asigurăm popularea corectă
const FALLBACK_IMG = "https://images.weserv.nl/?url=www.globalplayer.com/assets/track-placeholders/heart10s.png";
const stations = [
    { name: "Heart 10s", stream: "https://media-ice.musicradio.com/Heart10sMP3", img: "https://images.weserv.nl/?url=www.globalplayer.com/assets/track-placeholders/heart10s.png", desc: "POP, HITS, CHART", isFav: true, isAll: true },
    { name: "Kiss 10s", stream: "https://dc.digi.live.kissfm.ro/kiss.hits.from.the.10s/listen.m3u", img: "https://api.kissfm.ro/resized/streams/homepage/2025/01/10/cover-kiss-hits-from-the-10s_6210a8bb4e6b58d8b6d2c0342721cdb9.png", desc: "HITS FROM THE 10S", isFav: true, isAll: true },
    { name: "Radio Record", stream: "https://radiorecord.hostingradio.ru/rus96.aacp", img: "https://www.radiorecord.ru/icons/apple-touch-icon.png", desc: "RUSSIAN MIX", isRussian: true, isAll: true }
];

let currentIdx = 0;
let currentFilteredList = [];
let activeLayer = 1;
const audio = document.getElementById('audio-engine');

function init() {
    renderList('fav', document.getElementById('tab-fav'));
    lucide.createIcons();
    loadStationInfo(0, false);
}

function renderList(mode, el) {
    const list = document.getElementById('stations-list');
    list.innerHTML = "";
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    if(el) el.classList.add('active');
    
    currentFilteredList = stations.filter(s => mode === 'all' ? s.isAll : s[Object.keys(s).find(k => k.toLowerCase().includes(mode))]);
    if(currentFilteredList.length === 0) currentFilteredList = stations;

    currentFilteredList.forEach((s, i) => {
        const item = document.createElement('div');
        item.className = 'station-item';
        item.innerHTML = `<img src="${s.img}" class="station-thumb"><div><div class="station-name">${s.name}</div><div class="station-desc">${s.desc}</div></div>`;
        item.onclick = () => { currentIdx = i; playStation(); };
        list.appendChild(item);
    });
}

function loadStationInfo(idx, shouldPlay = true) {
    const s = currentFilteredList[idx] || stations[0];
    document.getElementById('player-img').src = s.img;
    audio.src = s.stream;
    
    const nextL = activeLayer === 1 ? document.getElementById('bg-layer-2') : document.getElementById('bg-layer-1');
    const prevL = activeLayer === 1 ? document.getElementById('bg-layer-1') : document.getElementById('bg-layer-2');
    nextL.style.backgroundImage = `url(${s.img})`;
    nextL.style.opacity = '1';
    prevL.style.opacity = '0';
    activeLayer = activeLayer === 1 ? 2 : 1;

    document.getElementById('slide-current').querySelector('h2').innerText = s.name;
    document.getElementById('slide-current').querySelector('p').innerText = s.desc;

    if(shouldPlay) audio.play().catch(() => {});
    updateUI(!audio.paused && shouldPlay);
}

function playStation() { loadStationInfo(currentIdx, true); switchTab('player'); }
function togglePlay() { audio.paused ? audio.play() : audio.pause(); updateUI(!audio.paused); }
function updateUI(p) {
    const b = document.getElementById('play-trigger');
    b.innerHTML = p ? '<i data-lucide="pause"></i>' : '<i data-lucide="play"></i>';
    p ? b.classList.add('playing') : b.classList.remove('playing');
    lucide.createIcons();
}

function switchTab(t) {
    const nav = document.getElementById('main-nav');
    document.getElementById('list-view').style.display = t==='list'?'flex':'none';
    document.getElementById('player-view').style.display = t==='player'?'flex':'none';
    document.getElementById('nav-list').classList.toggle('active', t==='list');
    document.getElementById('nav-player').classList.toggle('active', t==='player');
    nav.className = t==='list' ? 'nav-bar on-radio' : 'nav-bar on-player';
}

init();
</script>
</body>
</html>
