<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sergiu FM</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Sergiu FM">
    
    <link rel="icon" href="favicon.png" type="image/png">
    <link rel="apple-touch-icon" href="icon-180.png">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --accent: #ff5e3a;
            --glass: rgba(255, 255, 255, 0.1);
            --bg-dark: #000000;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; padding: 0; 
            font-family: 'Inter', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            -webkit-user-select: none;
            user-select: none;
            overscroll-behavior: none;
        }

        /* Fullscreen fix pentru iOS Safe Areas */
        body { 
            background: var(--bg-dark); 
            color: white; 
            height: 100dvh; 
            width: 100vw;
            overflow: hidden;
            display: flex; 
            justify-content: center;
            touch-action: none; /* Previne scroll-ul accidental al paginii pe mobil */
        }

        .app-container {
            width: 100%; max-width: 430px; height: 100%; position: relative; overflow: hidden;
            display: flex; flex-direction: column;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* --- Restul stilurilor tale CSS raman neschimbate --- */
        .bg-blur, .main-art { will-change: transform, opacity; contain: paint; }
        .app-container { opacity: 0; transition: opacity 0.3s ease-in; }
        .app-ready .app-container { opacity: 1; }
        .playing-icon { display: none; align-items: flex-end; gap: 2px; width: 20px; height: 20px; margin-left: 10px; }
        .station-item.is-playing .playing-icon { display: flex; }
        .playing-icon span { display: inline-block; width: 3px; background: linear-gradient(to top, var(--accent), #ff9d85); border-radius: 2px; animation: bounce 0.5s ease-in-out infinite alternate; }
        @keyframes bounce { from { height: 5px; } to { height: 18px; } }
        .bg-blur { position: absolute; top: -10%; left: -10%; width: 120%; height: 120%; background-size: cover; background-position: center; filter: blur(40px) brightness(0.4) saturate(1.2); z-index: 0; opacity: 0; transition: opacity 1.5s ease-in-out; }
        .header-tabs { position: relative; z-index: 10; padding: 15px 20px 10px; display: flex; gap: 10px; overflow-x: auto; }
        .tab { background: var(--glass); padding: 8px 18px; border-radius: 20px; font-size: 13px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); cursor: pointer; white-space: nowrap; font-weight: 800; transition: all 0.2s ease; }
        .tab.active { background: var(--accent); border-color: transparent; }
        .content { position: relative; z-index: 10; flex: 1; padding: 0 20px 140px 20px; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .station-item { display: flex; align-items: center; padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .station-thumb { width: 55px; height: 55px; border-radius: 12px; margin-right: 15px; object-fit: cover; background: #111; }
        .station-name { font-weight: 600; font-size: 16px; }
        .station-desc { font-size: 11px; color: #b3b3b3; text-transform: uppercase; }
        #player-view { display: none; position: relative; z-index: 10; height: 100%; flex-direction: column; align-items: center; justify-content: center; padding-bottom: 120px; }
        .art-container { width: 280px; height: 280px; position: relative; margin-bottom: 30px; }
        .main-art { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 30px; box-shadow: 0 30px 60px rgba(0,0,0,0.7); object-fit: cover; }
        .art-hidden { opacity: 0; transform: scale(0.95); }
        .track-info-slide h2 { font-size: 24px; font-weight: 600; margin-bottom: 8px; }
        .main-controls { display: flex; align-items: center; gap: 35px; }
        .btn-round { background: var(--glass); width: 58px; height: 58px; border-radius: 50%; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); color: white; }
        .btn-play { background: #fff; color: #000; width: 75px; height: 75px; }
        .btn-play.playing { background: var(--accent); color: #fff; box-shadow: 0 0 30px rgba(255, 94, 58, 0.4); }
        .nav-bar { position: absolute; bottom: 30px; left: 25px; right: 25px; z-index: 50; background: rgba(25,25,25,0.8); backdrop-filter: blur(25px); border-radius: 40px; display: flex; padding: 8px; border: 1px solid rgba(255,255,255,0.08); transition: all 0.4s ease; }
        .nav-link { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; color: #777; font-size: 11px; }
        .nav-link.active { color: #fff; }
        .fab { position: absolute; bottom: 120px; right: 30px; background: #fff; color: #000; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 25px rgba(0,0,0,0.4); z-index: 15; transition: 0.3s; }
        .fab.playing { background: var(--accent); color: #fff; }
        .spin { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .yt-hidden { display: none; }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="app-container">
    <div class="bg-blur" id="bg-layer-1"></div>
    <div class="bg-blur" id="bg-layer-2"></div>

    <div id="list-view" style="height:100%; display:flex; flex-direction:column;">
        <div class="header-tabs">
            <div class="tab" id="tab-all" onclick="renderList('all', this)">All</div>
            <div class="tab" id="tab-fav" onclick="renderList('fav', this)">Favorites</div>
            <div class="tab active" id="tab-mine" onclick="renderList('mine', this)">Owned</div>
        </div>
        <div class="content" id="stations-list"></div>
        <div class="fab" id="fab-play-pause" onclick="togglePlay()">
            <i data-lucide="play" fill="currentColor"></i>
        </div>
    </div> 

    <div id="player-view">
        <div class="art-container" id="swipe-zone-art">
            <img src="" class="main-art art-visible" id="player-img-1">
            <img src="" class="main-art art-hidden" id="player-img-2">
        </div>
        <div class="track-info-slide" style="text-align: center; margin-bottom: 40px;" id="slide-current">
            <h2 style="padding: 0 20px;">Alege un post</h2>
            <p style="color:#b3b3b3">Radio Player</p>
        </div>
        <div class="main-controls">
            <div class="btn-round" onclick="prev()"><i data-lucide="skip-back" fill="currentColor"></i></div>
            <div class="btn-round btn-play" id="play-trigger" onclick="togglePlay()"><i data-lucide="play" fill="currentColor"></i></div>
            <div class="btn-round" onclick="next()"><i data-lucide="skip-forward" fill="currentColor"></i></div>
        </div>
    </div>

    <div class="nav-bar" id="main-nav">
        <div class="nav-link" id="nav-player" onclick="switchTab('player')">
            <i data-lucide="play-circle"></i><span>Player</span>
        </div>
        <div class="nav-link active" id="nav-list" onclick="switchTab('list')">
            <i data-lucide="radio"></i><span>Radio</span>
        </div>
    </div>
</div>

<audio id="audio-engine" preload="auto" crossorigin="anonymous"></audio>

<script>
/** * LOGICA PWA - Din exemplul MDN js13kpwa
 */
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').then((registration) => {
            console.log('ServiceWorker registration successful with scope: ', registration.scope);
        }, (err) => {
            console.log('ServiceWorker registration failed: ', err);
        });
    });
}

/**
 * LOGICA RADIO (Varianta simplificata pentru stabilitate PWA)
 */
let currentIdx = 0;
let currentFilteredList = []; 
let activeStationObject = null;
const audio = document.getElementById('audio-engine');
const FALLBACK_IMG = "https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?q=80&w=1000&auto=format&fit=crop";

const stations = [
    { name: "Muzică 10s", stream: "https://sergiumusic.duckdns.org/muzicaveche", img: "https://mosaic.scdn.co/640/ab67616d00001e021badc66d1c9de6a98d376946ab67616d00001e022b605014f0cf0ca5e3c46b64ab67616d00001e02baa7a73c40a30e2c780c6841ab67616d00001e02ce26853f4b61f0924446f683", desc: "Sergiu | Childhood", isMine: true, isAll: true },
    { name: "Hope", stream: "https://sergiumusic.duckdns.org/hope", img: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT8aX5i1Sosu19dYGhKZwB3XHN2aFFLnuPUToBVDQVjOplOdpr5q3ZxEy8&s=10", desc: "Sergiu | Lovefool Pop", isMine: true, isAll: true },
    { name: "Kiss 10s", stream: "https://dc.digi.live.kissfm.ro/kiss.hits.from.the.10s/listen.m3u", img: "https://api.kissfm.ro/resized/streams/homepage/2025/01/10/cover-kiss-hits-from-the-10s_6210a8bb4e6b58d8b6d2c0342721cdb9.png", desc: "HITS FROM THE 10S", isFav: true, isAll: true }
];

function renderList(mode, el) {
    const list = document.getElementById('stations-list');
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    if(el) el.classList.add('active');
    
    list.innerHTML = "";
    const key = `is${mode.charAt(0).toUpperCase() + mode.slice(1)}`;
    currentFilteredList = stations.filter(s => s[key]);

    currentFilteredList.forEach((s, index) => {
        const item = document.createElement('div');
        item.className = `station-item ${activeStationObject?.name === s.name ? 'is-playing' : ''}`;
        item.innerHTML = `
            <img src="${s.img}" class="station-thumb">
            <div style="flex:1">
                <div class="station-name">${s.name}</div>
                <div class="station-desc">${s.desc}</div>
            </div>
            <div class="playing-icon"><span></span><span></span><span></span></div>
        `;
        item.onclick = () => {
            currentIdx = index;
            loadStation(currentIdx);
        };
        list.appendChild(item);
    });
}

function loadStation(idx) {
    const s = currentFilteredList[idx];
    activeStationObject = s;
    audio.src = s.stream;
    audio.play();
    
    // Update UI
    document.getElementById('player-img-1').src = s.img;
    document.getElementById('bg-layer-1').style.backgroundImage = `url(${s.img})`;
    document.getElementById('bg-layer-1').style.opacity = 1;
    document.querySelector('#slide-current h2').innerText = s.name;
    document.querySelector('#slide-current p').innerText = s.desc;
    
    updateUI(true);
}

function togglePlay() {
    if (audio.paused) {
        if(!audio.src) loadStation(currentIdx);
        else audio.play();
    } else {
        audio.pause();
    }
}

function next() {
    currentIdx = (currentIdx + 1) % currentFilteredList.length;
    loadStation(currentIdx);
}

function prev() {
    currentIdx = (currentIdx - 1 + currentFilteredList.length) % currentFilteredList.length;
    loadStation(currentIdx);
}

function switchTab(t) {
    const isPlayer = t === 'player';
    document.getElementById('list-view').style.display = isPlayer ? 'none' : 'flex';
    document.getElementById('player-view').style.display = isPlayer ? 'flex' : 'none';
    document.getElementById('nav-list').classList.toggle('active', !isPlayer);
    document.getElementById('nav-player').classList.toggle('active', isPlayer);
}

function updateUI(isPlaying) {
    const icon = isPlaying ? 'pause' : 'play';
    document.getElementById('play-trigger').innerHTML = `<i data-lucide="${icon}" fill="currentColor"></i>`;
    document.getElementById('fab-play-pause').innerHTML = `<i data-lucide="${icon}" fill="currentColor"></i>`;
    document.getElementById('fab-play-pause').classList.toggle('playing', isPlaying);
    lucide.createIcons();
    renderList(document.querySelector('.tab.active').id.replace('tab-', ''), null);
}

audio.onplay = () => updateUI(true);
audio.onpause = () => updateUI(false);

// Start
renderList('mine', document.getElementById('tab-mine'));
lucide.createIcons();
setTimeout(() => document.body.classList.add('app-ready'), 100);
</script>
</body>
</html>
