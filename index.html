<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sergiu FM Premium</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --accent: #ff5e3a;
            --bg-dark: #000000;
            /* Offset-ul magic: împingem fundul paginii cu 50px sub ecranul fizic */
            --magic-offset: 55px; 
        }

        /* Blocăm scroll-ul și forțăm dimensiunea fixă */
        html, body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: var(--bg-dark);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            position: fixed;
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
        }

        /* Containerul MINCINOS: e mai înalt decât ecranul */
        .app-over-scan {
            width: 100vw;
            height: calc(100dvh + var(--magic-offset));
            position: absolute;
            top: 0;
            left: 0;
            display: flex;
            flex-direction: column;
            z-index: 1;
        }

        /* Fundalul care "curge" sub marginea telefonului */
        .bg-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%; /* Acoperă tot, inclusiv offset-ul */
            background-image: url('https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?q=80&w=1000');
            background-size: cover;
            background-position: center;
            filter: blur(45px) brightness(0.3);
            z-index: -1;
            transform: scale(1.1); /* Evităm marginile albe de la blur */
        }

        /* Stratul UI care rămâne aliniat la ecranul vizibil */
        .ui-visible-area {
            height: 100dvh;
            width: 100%;
            display: flex;
            flex-direction: column;
            padding-top: env(safe-area-inset-top);
            position: relative;
        }

        .header {
            padding: 25px 20px 10px;
            color: white;
        }
        .header h1 { margin: 0; font-size: 24px; font-weight: 600; }

        .content-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 10px 20px 120px; /* Padding mare jos pentru listă */
            -webkit-overflow-scrolling: touch;
        }

        .station-card {
            background: rgba(255,255,255,0.05);
            margin-bottom: 12px;
            padding: 12px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
        }

        .station-img {
            width: 50px; height: 50px;
            border-radius: 12px;
            margin-right: 15px;
            object-fit: cover;
        }

        .station-info b { display: block; color: white; font-size: 15px; }
        .station-info span { color: #888; font-size: 12px; }

        /* Bara de Navigație: Poziționată manual deasupra zonei "moarte" */
        .custom-nav {
            position: absolute;
            bottom: 25px; /* Ajustăm să fie perfect deasupra marginii iPhone-ului */
            left: 20px;
            right: 20px;
            height: 70px;
            background: rgba(28, 28, 30, 0.95);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 35px;
            display: flex;
            align-items: center;
            justify-content: space-around;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }

        .nav-item {
            color: #666;
            text-align: center;
            font-size: 10px;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .nav-item.active { color: var(--accent); }

        /* Butonul mare de Play (Floating) */
        .play-master {
            width: 60px; height: 60px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: -40px; /* Îl ridicăm puțin din bară */
            box-shadow: 0 8px 20px rgba(255, 94, 58, 0.3);
            color: black;
        }
    </style>
</head>
<body>

    <div class="app-over-scan">
        <div class="bg-layer" id="main-bg"></div>
        
        <div class="ui-visible-area">
            <div class="header">
                <h1>Sergiu FM</h1>
            </div>

            <div class="content-scroll" id="station-list">
                </div>

            <div class="custom-nav">
                <a href="#" class="nav-item active">
                    <i data-lucide="radio"></i><span>Live</span>
                </a>
                
                <div class="play-master" onclick="togglePlay()" id="master-btn">
                    <i data-lucide="play" fill="black"></i>
                </div>

                <a href="#" class="nav-item">
                    <i data-lucide="settings"></i><span>Setări</span>
                </a>
            </div>
        </div>
    </div>

    <audio id="player" crossorigin="anonymous"></audio>

<script>
    const audio = document.getElementById('player');
    const masterBtn = document.getElementById('master-btn');
    const stations = [
        { name: "Muzică 10s", url: "https://sergiumusic.duckdns.org/muzicaveche", img: "https://images.unsplash.com/photo-1470225620780-dba8ba36b745?w=200" },
        { name: "Hope FM", url: "https://sergiumusic.duckdns.org/hope", img: "https://images.unsplash.com/photo-1493225255756-d9584f8606e9?w=200" }
    ];

    function buildList() {
        const container = document.getElementById('station-list');
        stations.forEach((s, i) => {
            container.innerHTML += `
                <div class="station-card" onclick="playStation(${i})">
                    <img src="${s.img}" class="station-img">
                    <div class="station-info">
                        <b>${s.name}</b>
                        <span>Streaming Online</span>
                    </div>
                </div>
            `;
        });
    }

    function playStation(index) {
        audio.src = stations[index].url;
        audio.play();
        document.getElementById('main-bg').style.backgroundImage = `url(${stations[index].img})`;
        updateBtn(true);
    }

    function togglePlay() {
        if (audio.paused) {
            if (!audio.src) playStation(0);
            else audio.play();
            updateBtn(true);
        } else {
            audio.pause();
            updateBtn(false);
        }
    }

    function updateBtn(isPlaying) {
        masterBtn.innerHTML = `<i data-lucide="${isPlaying ? 'pause' : 'play'}" fill="black"></i>`;
        lucide.createIcons();
    }

    // Inițializare
    lucide.createIcons();
    buildList();

    // Blocare scroll elastic pe iOS (PWA fix)
    document.addEventListener('touchmove', function(e) {
        if (e.target.closest('.content-scroll')) return;
        e.preventDefault();
    }, { passive: false });

</script>
</body>
</html>
